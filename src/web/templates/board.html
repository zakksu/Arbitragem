<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arbitragem Scalper — Structure Deck</title>
    <link rel="stylesheet" href="/static/blackboard.css">
    <link rel="stylesheet" href="/static/blackboard_4_0.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bb-app">
    <header class="bb-status" id="status-bar"
            hx-get="/board/partials/status"
            hx-trigger="load, every 30s"
            hx-swap="outerHTML">
        <div class="bb-logo">Arbitragem Scalper <span>Structure Deck</span></div>
        <div class="bb-status-item"><span class="bb-loading"></span> loading…</div>
    </header>
    <div id="setup-panel" class="bb-setup-drawer" aria-live="polite"></div>

    <main class="bb-main">
        <section class="bb-col bb-col-watch" aria-label="Watchlist">
            <div class="bb-col-head">
                <span>Watchlist</span>
                <em id="watch-count">—</em>
            </div>
            <div class="bb-col-body"
                 id="watchlist"
                 hx-get="/board/partials/watchlist"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <div class="bb-watch-empty"><span class="bb-loading"></span></div>
            </div>
        </section>

        <section class="bb-col bb-col-board" aria-label="Symbol blackboard">
            <div class="bb-col-head">
                <span>Blackboard</span>
                <span id="active-symbol-label" class="htmx-indicator bb-loading"></span>
            </div>
            <div class="bb-col-body" id="symbol-panel">
                <div class="bb-symbol-panel">
                    <div class="bb-symbol-placeholder">
                        <div class="bb-ph-icon">▣</div>
                        <p>Click a symbol in the watchlist<br>to open the blackboard panel</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="bb-col bb-col-ideas" aria-label="Idea stack">
            <div class="bb-col-head">
                <span>Idea Stack</span>
                <em id="ideas-count">—</em>
            </div>
            <div class="bb-col-body"
                 id="idea-stack"
                 hx-get="/board/partials/ideas"
                 hx-trigger="load, every 60s"
                 hx-swap="innerHTML">
                <div class="bb-ideas-empty"><span class="bb-loading"></span></div>
            </div>
        </section>
    </main>

    <footer class="bb-footer">
        <div id="pulse-rail" class="bb-footer-pulse"
             hx-get="/board/partials/pulse-rail"
             hx-trigger="load, every 120s"
             hx-swap="innerHTML">
            <span class="bb-muted">Loading pulse rail…</span>
        </div>
        <span class="bb-footer-hint"><kbd>S</kbd> scan · <kbd>K</kbd> kill toggle · <kbd>1-9</kbd> watchlist · <kbd>R</kbd> refresh</span>
    </footer>

    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        window.bbMountSymbolChart = function (panel) {
            if (!panel) return;
            var wrap = panel.querySelector(".bb-chart-wrap");
            var el = panel.querySelector(".bb-chart-canvas");
            if (!wrap || !el || el.dataset.mounted === "1") return;

            function mount() {
                if (typeof LightweightCharts === "undefined") {
                    setTimeout(mount, 50);
                    return;
                }
                var w = el.clientWidth || wrap.clientWidth || 480;
                if (w < 24) {
                    requestAnimationFrame(mount);
                    return;
                }
                el.dataset.mounted = "1";
                el.textContent = "";
                var last = parseFloat(wrap.dataset.last || "0") || 100;
                var candles = [];
                try {
                    candles = JSON.parse(wrap.dataset.candles || "[]");
                } catch (err) { /* ignore */ }

                var chart = LightweightCharts.createChart(el, {
                    width: w,
                    height: 160,
                    layout: { background: { color: "#121212" }, textColor: "#8a8a8a" },
                    grid: { vertLines: { color: "#1f1f1f" }, horzLines: { color: "#1f1f1f" } },
                    rightPriceScale: { borderColor: "#2a2a2a" },
                    timeScale: { borderColor: "#2a2a2a" },
                });

                var series;
                if (candles.length) {
                    series = chart.addCandlestickSeries({
                        upColor: "#22c55e",
                        downColor: "#ef4444",
                        borderVisible: false,
                        wickUpColor: "#22c55e",
                        wickDownColor: "#ef4444",
                    });
                    series.setData(candles);
                } else {
                    series = chart.addAreaSeries({
                        lineColor: "#f59e0b",
                        topColor: "rgba(245,158,11,0.35)",
                        bottomColor: "rgba(245,158,11,0)",
                    });
                    var now = Math.floor(Date.now() / 1000);
                    var data = [];
                    for (var i = 30; i >= 0; i--) {
                        var t = now - i * 60;
                        var jitter = Math.sin(i / 3) * 0.08;
                        data.push({ time: t, value: +(last * (1 + jitter)).toFixed(2) });
                    }
                    series.setData(data);
                }

                var mp = parseFloat(wrap.dataset.maxPain || "");
                if (!isNaN(mp) && mp > 0 && last > 0) {
                    var dist = Math.abs(mp - last) / last;
                    if (dist < 0.35) {
                        series.createPriceLine({
                            price: mp,
                            color: "#3b82f6",
                            lineWidth: 1,
                            lineStyle: 2,
                            axisLabelVisible: true,
                            title: "Max pain",
                        });
                    }
                }

                function addLevel(attr, color, title) {
                    var v = parseFloat(wrap.dataset[attr] || "");
                    if (!isNaN(v) && v > 0) {
                        series.createPriceLine({
                            price: v,
                            color: color,
                            lineWidth: 2,
                            lineStyle: 0,
                            axisLabelVisible: true,
                            title: title,
                        });
                    }
                }
                addLevel("entry", "#f59e0b", "Entry");
                addLevel("stop", "#ef4444", "Stop");
                addLevel("target", "#22c55e", "Target");

                new ResizeObserver(function () {
                    var next = el.clientWidth || w;
                    if (next > 0) chart.applyOptions({ width: next });
                }).observe(el);
            }
            requestAnimationFrame(mount);
        };

        window.bbNtslArmDone = function (evt) {
            var modal = document.getElementById("ntsl-arm-modal");
            var xhr = evt.detail.xhr;
            var msg = xhr && xhr.responseText ? xhr.responseText : "NTSL armed";
            if (modal) modal.remove();
            if (window.htmx && xhr && xhr.status < 400) {
                var toast = document.createElement("div");
                toast.className = "bb-toast";
                toast.textContent = msg;
                document.body.appendChild(toast);
                setTimeout(function () { toast.remove(); }, 4000);
            }
        };

        document.body.addEventListener("htmx:afterRequest", function (evt) {
            var preset = evt.detail.elt && evt.detail.elt.dataset && evt.detail.elt.dataset.preset;
            if (!preset) return;
            var cols = {
                scalp: { watch: "220px", ideas: "300px" },
                options_hedge: { watch: "200px", ideas: "340px" },
                pairs: { watch: "240px", ideas: "280px" }
            };
            var c = cols[preset] || cols.scalp;
            document.documentElement.style.setProperty("--arb-watch-w", c.watch);
            document.documentElement.style.setProperty("--arb-ideas-w", c.ideas);
            document.querySelectorAll(".bb-btn-layout").forEach(function (b) {
                b.classList.toggle("is-active", b.dataset.preset === preset);
            });
        });

        function bbInitWatchlistSort(root) {
            if (!root) return;
            var table = root.querySelector("#watchlist-table");
            if (!table || table.dataset.sortReady === "1") return;
            table.dataset.sortReady = "1";
            var tbody = table.querySelector("tbody");
            if (!tbody) return;

            function sortBy(key, asc) {
                var type = table.querySelector('th[data-sort="' + key + '"]');
                var sortType = type ? type.getAttribute("data-sort-type") : "text";
                var rows = Array.prototype.slice.call(tbody.querySelectorAll("tr"));
                rows.sort(function (a, b) {
                    var av = a.getAttribute("data-sort-" + key) || "";
                    var bv = b.getAttribute("data-sort-" + key) || "";
                    if (sortType === "number") {
                        av = parseFloat(av);
                        bv = parseFloat(bv);
                        if (isNaN(av)) av = -1;
                        if (isNaN(bv)) bv = -1;
                        return asc ? av - bv : bv - av;
                    }
                    av = String(av).toUpperCase();
                    bv = String(bv).toUpperCase();
                    if (av < bv) return asc ? -1 : 1;
                    if (av > bv) return asc ? 1 : -1;
                    return 0;
                });
                rows.forEach(function (r) { tbody.appendChild(r); });
                table.querySelectorAll(".bb-sortable").forEach(function (th) {
                    th.classList.remove("is-sorted-asc", "is-sorted-desc");
                });
                if (type) {
                    type.classList.add(asc ? "is-sorted-asc" : "is-sorted-desc");
                }
            }

            table.querySelectorAll(".bb-sortable").forEach(function (th) {
                th.addEventListener("click", function (evt) {
                    if (evt.target.closest(".bb-help-tip")) return;
                    var key = th.getAttribute("data-sort");
                    var asc = th.dataset.sortAsc !== "1";
                    th.dataset.sortAsc = asc ? "1" : "0";
                    table.querySelectorAll(".bb-sortable").forEach(function (other) {
                        if (other !== th) other.dataset.sortAsc = "";
                    });
                    sortBy(key, asc);
                });
            });
        }

        document.body.addEventListener("htmx:afterSwap", function (evt) {
            if (evt.detail.target.id === "watchlist") {
                var count = evt.detail.target.querySelector("[data-count]");
                if (count) {
                    document.getElementById("watch-count").textContent = count.dataset.count;
                }
                if (window.bbQuoteStream) {
                    window.bbQuoteStream.resubscribe();
                }
                bbInitWatchlistSort(evt.detail.target);
            }
            if (evt.detail.target.id === "idea-stack") {
                var ideas = evt.detail.target.querySelector("[data-count]");
                if (ideas) {
                    document.getElementById("ideas-count").textContent = ideas.dataset.count;
                }
                var modal = document.getElementById("idea-modal");
                if (modal) modal.remove();
            }
            if (evt.detail.target.id === "symbol-panel") {
                var sym = evt.detail.target.querySelector("[data-symbol]");
                var label = document.getElementById("active-symbol-label");
                if (sym && label) {
                    label.textContent = sym.dataset.symbol;
                    label.classList.remove("bb-loading", "htmx-indicator");
                }
                var panel = evt.detail.target.querySelector(".bb-symbol-panel");
                if (panel) window.bbMountSymbolChart(panel);
            }
        });

        document.body.addEventListener("htmx:afterSettle", function (evt) {
            if (evt.detail.target.id === "symbol-panel") {
                var panel = evt.detail.target.querySelector(".bb-symbol-panel");
                if (panel) window.bbMountSymbolChart(panel);
            }
        });

        function loadSymbolPanel(row) {
            var url = row.getAttribute("data-symbol-url");
            if (!url || typeof htmx === "undefined") return;
            var sym = row.getAttribute("data-symbol") || "";
            var panel = document.getElementById("symbol-panel");
            if (panel) {
                panel.innerHTML =
                    '<div class="bb-panel-loading"><span class="bb-loading"></span><span>Loading ' +
                    sym +
                    "…</span></div>";
            }
            htmx.ajax("GET", url, {
                target: "#symbol-panel",
                swap: "innerHTML",
                indicator: "#active-symbol-label",
            });
            htmx.ajax("GET", "/board/partials/ideas?symbol=" + encodeURIComponent(sym), {
                target: "#idea-stack",
                swap: "innerHTML",
            });
            window.bbActiveSymbol = sym;
        }

        document.body.addEventListener("click", function (evt) {
            var row = evt.target.closest(".bb-watch-row");
            if (!row) return;
            document.querySelectorAll(".bb-watch-row.is-active").forEach(function (r) {
                r.classList.remove("is-active");
            });
            row.classList.add("is-active");
            loadSymbolPanel(row);
        });

        document.body.addEventListener("keydown", function (evt) {
            if (evt.key !== "Enter" && evt.key !== " ") return;
            var row = evt.target.closest(".bb-watch-row");
            if (!row) return;
            evt.preventDefault();
            row.click();
        });

        document.addEventListener("keydown", function (evt) {
            if (evt.target.tagName === "TEXTAREA" || evt.target.tagName === "INPUT") return;
            if (evt.key === "r" && !evt.ctrlKey && !evt.metaKey) {
                htmx.trigger("#watchlist", "load");
            }
            if (evt.key === "s" || evt.key === "S") {
                htmx.ajax("POST", "/board/scan", { target: "#idea-stack", swap: "innerHTML" });
            }
            if (evt.key === "k" || evt.key === "K") {
                var btn = document.getElementById("kill-switch-btn");
                if (btn) {
                    var on = btn.dataset.killActive === "true";
                    htmx.ajax("POST", "/api/v1/risk/kill-switch", {
                        values: { active: !on, reason: on ? "keyboard resume" : "keyboard stop" },
                        swap: "none"
                    }).then(function () {
                        btn.dataset.killActive = on ? "false" : "true";
                        htmx.trigger("#status-bar", "load");
                        htmx.trigger("#idea-stack", "load");
                    });
                }
            }
            if (evt.key >= "1" && evt.key <= "9") {
                var rows = document.querySelectorAll(".bb-watch-row");
                var idx = parseInt(evt.key, 10) - 1;
                if (rows[idx]) rows[idx].click();
            }
            if (evt.key === "Enter" && !evt.target.closest(".bb-watch-row")) {
                var top = document.querySelector(".bb-idea .bb-btn-confirm");
                if (top) top.click();
            }
        });

        function tickClock() {
            var el = document.getElementById("bb-clock");
            if (el) {
                el.textContent = new Date().toLocaleTimeString("pt-BR", { hour12: false });
            }
        }
        setInterval(tickClock, 1000);
        tickClock();

        function bbFormatPrice(v) {
            if (v == null || isNaN(v)) return "—";
            return Number(v).toFixed(2);
        }

        function bbUpdateQuoteCell(el, value) {
            if (!el) return;
            var next = bbFormatPrice(value);
            if (el.textContent.trim() !== next) {
                el.textContent = next;
                el.classList.add("bb-price-flash");
                setTimeout(function () { el.classList.remove("bb-price-flash"); }, 400);
            }
        }

        function bbApplyQuotes(quotes) {
            if (!quotes) return;
            Object.keys(quotes).forEach(function (sym) {
                var q = quotes[sym];
                var row = document.querySelector('.bb-watch-row[data-symbol="' + sym + '"]');
                if (row) {
                    bbUpdateQuoteCell(row.querySelector(".bb-quote-last"), q.last);
                    bbUpdateQuoteCell(row.querySelector(".bb-bid"), q.bid);
                    bbUpdateQuoteCell(row.querySelector(".bb-ask"), q.ask);
                }
                var panel = document.querySelector('.bb-symbol-panel[data-symbol="' + sym + '"]');
                if (panel) {
                    bbUpdateQuoteCell(panel.querySelector(".bb-symbol-header .bb-quote-last"), q.last);
                    panel.querySelectorAll(".bb-quote-grid .bb-quote-last").forEach(function (el) {
                        bbUpdateQuoteCell(el, q.last);
                    });
                    bbUpdateQuoteCell(panel.querySelector(".bb-quote-grid .bb-bid"), q.bid);
                    bbUpdateQuoteCell(panel.querySelector(".bb-quote-grid .bb-ask"), q.ask);
                }
            });
        }

        (function bbInitQuoteStream() {
            if (typeof EventSource === "undefined") return;
            var es = new EventSource("/api/v1/stream/quotes");
            es.onmessage = function (ev) {
                try {
                    var data = JSON.parse(ev.data);
                    if (data.type === "heartbeat") return;
                    if (data.type === "quotes") bbApplyQuotes(data.quotes);
                } catch (err) { /* ignore malformed */ }
            };
            window.bbQuoteStream = {
                resubscribe: function () { /* EventSource stays open; DOM rows refreshed */ },
                close: function () { es.close(); },
            };
        })();
    </script>
</body>
</html>
