<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arbitragem — Structure Deck</title>
    <link rel="stylesheet" href="/static/blackboard.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bb-app">
    <header class="bb-status" id="status-bar"
            hx-get="/board/partials/status"
            hx-trigger="load, every 30s"
            hx-swap="outerHTML">
        <div class="bb-logo">Arbitragem <span>Structure Deck</span></div>
        <div class="bb-status-item"><span class="bb-loading"></span> loading…</div>
    </header>
    <div id="setup-panel" class="bb-setup-drawer" aria-live="polite"></div>

    <div id="risk-cockpit-wrap"
         hx-get="/board/partials/risk-cockpit"
         hx-trigger="load, every 20s"
         hx-swap="innerHTML">
        <div class="bb-risk-cockpit bb-risk-ok"><span class="bb-loading"></span></div>
    </div>

    <main class="bb-main">
        <section class="bb-col bb-col-watch" aria-label="Watchlist">
            <div class="bb-col-head">
                <span>Watchlist</span>
                <em id="watch-count">—</em>
            </div>
            <div class="bb-col-body"
                 id="watchlist"
                 hx-get="/board/partials/watchlist"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <div class="bb-watch-empty"><span class="bb-loading"></span></div>
            </div>
        </section>

        <section class="bb-col bb-col-board" aria-label="Symbol blackboard">
            <div class="bb-col-head">
                <span>Blackboard</span>
                <span id="active-symbol-label" class="htmx-indicator bb-loading"></span>
            </div>
            <div class="bb-col-body" id="symbol-panel">
                <div class="bb-symbol-panel">
                    <div class="bb-symbol-placeholder">
                        <div class="bb-ph-icon">▣</div>
                        <p>Click a symbol in the watchlist<br>to open the blackboard panel</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="bb-col bb-col-ideas" aria-label="Idea stack">
            <div class="bb-col-head">
                <span>Idea Stack</span>
                <em id="ideas-count">—</em>
            </div>
            <div class="bb-col-body"
                 id="idea-stack"
                 hx-get="/board/partials/ideas"
                 hx-trigger="load, every 20s"
                 hx-swap="innerHTML">
                <div class="bb-ideas-empty"><span class="bb-loading"></span></div>
            </div>
        </section>
    </main>

    <footer class="bb-footer">
        <div id="opportunity-rail" class="bb-footer-opportunity"
             hx-get="/board/partials/opportunity-rail"
             hx-trigger="load, every 30s"
             hx-swap="innerHTML">
            <span class="bb-muted">Loading opportunity rail…</span>
        </div>
        <div id="sector-strip" class="bb-footer-sectors"
             hx-get="/board/partials/sector-strip"
             hx-trigger="load"
             hx-swap="innerHTML">
            <span class="bb-muted">Loading sector baskets…</span>
        </div>
        <span class="bb-footer-hint"><kbd>R</kbd> refresh watchlist</span>
    </footer>

    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        document.body.addEventListener("htmx:afterRequest", function (evt) {
            var preset = evt.detail.elt && evt.detail.elt.dataset && evt.detail.elt.dataset.preset;
            if (!preset) return;
            var cols = {
                scalp: { watch: "220px", ideas: "300px" },
                options_hedge: { watch: "200px", ideas: "340px" },
                pairs: { watch: "240px", ideas: "280px" }
            };
            var c = cols[preset] || cols.scalp;
            document.documentElement.style.setProperty("--arb-watch-w", c.watch);
            document.documentElement.style.setProperty("--arb-ideas-w", c.ideas);
            document.querySelectorAll(".bb-btn-layout").forEach(function (b) {
                b.classList.toggle("is-active", b.dataset.preset === preset);
            });
        });

        document.body.addEventListener("htmx:afterSwap", function (evt) {
            if (evt.detail.target.id === "watchlist") {
                var count = evt.detail.target.querySelector("[data-count]");
                if (count) {
                    document.getElementById("watch-count").textContent = count.dataset.count;
                }
                if (window.bbQuoteStream) {
                    window.bbQuoteStream.resubscribe();
                }
            }
            if (evt.detail.target.id === "idea-stack") {
                var ideas = evt.detail.target.querySelector("[data-count]");
                if (ideas) {
                    document.getElementById("ideas-count").textContent = ideas.dataset.count;
                }
                var modal = document.getElementById("idea-modal");
                if (modal) modal.remove();
            }
            if (evt.detail.target.id === "symbol-panel") {
                var sym = evt.detail.target.querySelector("[data-symbol]");
                var label = document.getElementById("active-symbol-label");
                if (sym && label) {
                    label.textContent = sym.dataset.symbol;
                    label.classList.remove("bb-loading", "htmx-indicator");
                }
            }
        });

        function loadSymbolPanel(row) {
            var url = row.getAttribute("data-symbol-url");
            if (!url || typeof htmx === "undefined") return;
            var sym = row.getAttribute("data-symbol") || "";
            var panel = document.getElementById("symbol-panel");
            if (panel) {
                panel.innerHTML =
                    '<div class="bb-panel-loading"><span class="bb-loading"></span><span>Loading ' +
                    sym +
                    "…</span></div>";
            }
            htmx.ajax("GET", url, {
                target: "#symbol-panel",
                swap: "innerHTML",
                indicator: "#active-symbol-label",
            });
        }

        document.body.addEventListener("click", function (evt) {
            var row = evt.target.closest(".bb-watch-row");
            if (!row) return;
            document.querySelectorAll(".bb-watch-row.is-active").forEach(function (r) {
                r.classList.remove("is-active");
            });
            row.classList.add("is-active");
            loadSymbolPanel(row);
        });

        document.body.addEventListener("keydown", function (evt) {
            if (evt.key !== "Enter" && evt.key !== " ") return;
            var row = evt.target.closest(".bb-watch-row");
            if (!row) return;
            evt.preventDefault();
            row.click();
        });

        document.addEventListener("keydown", function (evt) {
            if (evt.key === "r" && !evt.ctrlKey && !evt.metaKey && evt.target.tagName !== "TEXTAREA") {
                htmx.trigger("#watchlist", "load");
            }
        });

        function tickClock() {
            var el = document.getElementById("bb-clock");
            if (el) {
                el.textContent = new Date().toLocaleTimeString("pt-BR", { hour12: false });
            }
        }
        setInterval(tickClock, 1000);
        tickClock();

        function bbFormatPrice(v) {
            if (v == null || isNaN(v)) return "—";
            return Number(v).toFixed(2);
        }

        function bbUpdateQuoteCell(el, value) {
            if (!el) return;
            var next = bbFormatPrice(value);
            if (el.textContent.trim() !== next) {
                el.textContent = next;
                el.classList.add("bb-price-flash");
                setTimeout(function () { el.classList.remove("bb-price-flash"); }, 400);
            }
        }

        function bbApplyQuotes(quotes) {
            if (!quotes) return;
            Object.keys(quotes).forEach(function (sym) {
                var q = quotes[sym];
                var row = document.querySelector('.bb-watch-row[data-symbol="' + sym + '"]');
                if (row) {
                    bbUpdateQuoteCell(row.querySelector(".bb-quote-last"), q.last);
                    bbUpdateQuoteCell(row.querySelector(".bb-bid"), q.bid);
                    bbUpdateQuoteCell(row.querySelector(".bb-ask"), q.ask);
                }
                var panel = document.querySelector('.bb-symbol-panel[data-symbol="' + sym + '"]');
                if (panel) {
                    bbUpdateQuoteCell(panel.querySelector(".bb-symbol-header .bb-quote-last"), q.last);
                    panel.querySelectorAll(".bb-quote-grid .bb-quote-last").forEach(function (el) {
                        bbUpdateQuoteCell(el, q.last);
                    });
                    bbUpdateQuoteCell(panel.querySelector(".bb-quote-grid .bb-bid"), q.bid);
                    bbUpdateQuoteCell(panel.querySelector(".bb-quote-grid .bb-ask"), q.ask);
                }
            });
        }

        (function bbInitQuoteStream() {
            if (typeof EventSource === "undefined") return;
            var es = new EventSource("/api/v1/stream/quotes");
            es.onmessage = function (ev) {
                try {
                    var data = JSON.parse(ev.data);
                    if (data.type === "heartbeat") return;
                    if (data.type === "quotes") bbApplyQuotes(data.quotes);
                } catch (err) { /* ignore malformed */ }
            };
            window.bbQuoteStream = {
                resubscribe: function () { /* EventSource stays open; DOM rows refreshed */ },
                close: function () { es.close(); },
            };
        })();
    </script>
</body>
</html>
