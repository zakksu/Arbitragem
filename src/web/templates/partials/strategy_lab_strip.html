<details class="bb-strategy-lab-strip bb-glass" id="bb-strategy-lab-strip" open>
    <summary>
        Strategy Lab
        <a class="bb-btn-secondary bb-sl-full-link" href="/board/strategy-lab" onclick="event.stopPropagation();">Open lab →</a>
    </summary>
    <div class="bb-sl-body">
        <div class="bb-sl-structure-row">
            <span class="bb-muted">Structures</span>
            {% for row in structures %}
            <button type="button"
                    class="bb-sl-structure-chip{% if active_structure == row.id %} is-active{% endif %}"
                    hx-get="/board/partials/rankings-table?detail_target=strategy-lab-detail-slot&type={{ row.id }}"
                    hx-target="#strategy-lab-rankings"
                    hx-swap="innerHTML"
                    title="{{ row.description }}">
                {{ row.label }}
            </button>
            {% endfor %}
        </div>
        <div id="strategy-lab-rankings" class="bb-sl-rankings"
             hx-get="/board/partials/rankings-table?detail_target=strategy-lab-detail-slot{% if active_structure %}&type={{ active_structure }}{% endif %}"
             hx-trigger="load"
             hx-swap="innerHTML">
            <span class="bb-muted">Loading rankings…</span>
        </div>
        <div id="strategy-lab-detail-slot" class="bb-sl-detail"></div>
        <div id="strategy-store-desk-slot" class="bb-sl-store"
             hx-get="/board/partials/strategy-store"
             hx-trigger="load delay:150ms"
             hx-swap="innerHTML">
            <span class="bb-muted">NTSL store…</span>
        </div>
    </div>
</details>
