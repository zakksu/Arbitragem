{# HelpTip — EN explanation + optional PT-BR hint (premium hover bubble) #}
{% if key is defined and key %}
{% set _tt = get_tooltip(key) %}
{% set tip = _tt.en %}
{% set pt = _tt.pt %}
{% endif %}
<span class="bb-help-tip"
      role="button"
      tabindex="0"
      aria-label="{{ tip }}{% if pt %} ({{ pt }}){% endif %}"
      title="{{ tip }}{% if pt %} — {{ pt }}{% endif %}">
    <span class="bb-help-tip-icon" aria-hidden="true">?</span>
    <span class="bb-help-tip-bubble" role="tooltip">
        <span class="bb-help-tip-en">{{ tip }}</span>
        {% if pt %}<span class="bb-help-tip-pt">{{ pt }}</span>{% endif %}
    </span>
</span>
